name: Flutter release (all platforms)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_RUST_BRIDGE_CODEGEN_VERSION: "2.12.0"

jobs:
  # macOS + iOS share one runner so Rust/Cargo artifacts compile once.
  macos_ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create macOS DMG
        run: |
          npm install --global create-dmg
          create-dmg build/macos/Build/Products/Release/Drift.app --no-code-sign || true
          mv Drift\ *.dmg ../drift-macos-${{ github.ref_name }}.dmg

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package iOS zip
        run: |
          cd build/ios/Release-iphoneos
          zip -r ../../../drift-ios-unsigned-${{ github.ref_name }}.zip Runner.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-macos
          path: drift-macos-${{ github.ref_name }}.dmg
          if-no-files-found: error

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-ios-unsigned
          path: flutter/drift-ios-unsigned-${{ github.ref_name }}.zip
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang cmake curl git ninja-build pkg-config unzip xz-utils zip \
            libgtk-3-dev liblzma-dev libglu1-mesa libwebkit2gtk-4.1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Linux app
        run: flutter build linux --release

      - name: Package Linux zip
        run: |
          cd build/linux/x64/release
          zip -r ../../../../drift-linux-${{ github.ref_name }}.zip bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-linux
          path: flutter/drift-linux-${{ github.ref_name }}.zip
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create MSIX package
        run: dart run msix:create

      - name: Package portable Windows zip
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "build/windows/x64/runner/Release"
          $zipPath = Join-Path $PWD "drift-windows-portable-${{ github.ref_name }}.zip"
          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: drift-windows-msix
          path: flutter/build/windows/x64/runner/Release/*.msix
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: drift-windows-portable
          path: flutter/drift-windows-portable-${{ github.ref_name }}.zip
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Android APK
        run: flutter build apk --release

      - name: Package Android APK
        run: mv build/app/outputs/flutter-apk/app-release.apk drift-android-${{ github.ref_name }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-android
          path: flutter/drift-android-${{ github.ref_name }}.apk
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos_ios, linux, windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release-dist
          find artifacts -name "*.zip" -exec mv {} release-dist/ \;
          find artifacts -name "*.msix" -exec mv {} release-dist/ \;
          find artifacts -name "*.apk" -exec mv {} release-dist/ \;
          find artifacts -name "*.dmg" -exec mv {} release-dist/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
