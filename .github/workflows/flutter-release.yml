name: Flutter release (all platforms)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_RUST_BRIDGE_CODEGEN_VERSION: "2.12.0"

jobs:
  # macOS + iOS share one runner so Rust/Cargo artifacts compile once.
  macos_ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build macOS app
        run: flutter build macos --release

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-macos-app
          path: flutter/build/macos/Build/Products/Release/Drift.app
          if-no-files-found: error

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-ios-app-unsigned
          path: flutter/build/ios/Release-iphoneos/Runner.app
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang cmake curl git ninja-build pkg-config unzip xz-utils zip \
            libgtk-3-dev liblzma-dev libglu1-mesa libwebkit2gtk-4.1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Linux app
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-linux-bundle
          path: flutter/build/linux/x64/release/bundle
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create MSIX package
        run: dart run msix:create

      - name: Package portable Windows zip
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "build/windows/x64/runner/Release"
          $zipPath = Join-Path $releaseDir "drift-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: drift-windows-msix
          path: flutter/build/windows/x64/runner/Release/*.msix
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: drift-windows-portable
          path: flutter/build/windows/x64/runner/Release/drift-windows.zip
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-android-apk
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
