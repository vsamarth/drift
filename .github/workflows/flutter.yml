name: Flutter CI

on:
  push:
    branches:
      - main
    paths:
      - "flutter/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    paths:
      - "flutter/**"
      - ".github/workflows/flutter.yml"

jobs:
  flutter:
    name: Flutter
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
