[package]
name = "drift"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
bincode = "1.3"
clap = { version = "4.5", features = ["derive"] }
futures-lite = "2.6"
iroh = "0.96"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.47", features = ["fs", "io-util", "macros", "rt-multi-thread", "signal"] }
